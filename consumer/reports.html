<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Downloads — Silent Compute</title>
<link rel="stylesheet" href="../assets/styles.css">
<style>
  .filter-row { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
  select { padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 13px; outline: none; }
  select:focus { border-color: var(--accent); }
  .run-detail-row { display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap; }
</style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="wordmark">Silent Compute</div><div class="sub">Data Enrichment</div></div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Consumer</div>
      <a class="nav-item" href="home.html"><span class="icon">📊</span><span>My Enrichments</span></a>
      <a class="nav-item" href="marketplace.html"><span class="icon">🏪</span><span>Marketplace</span></a>
      <a class="nav-item active" href="reports.html"><span class="icon">📥</span><span>Downloads</span></a>
      <div class="divider" style="margin: 8px 0;"></div>
      <div class="nav-section-label">Account</div>
      <a class="nav-item" href="billing.html"><span class="icon">💳</span><span>Billing</span></a>
      <a class="nav-item" href="onboarding.html"><span class="icon">⚙️</span><span>Data Source</span></a>
      <div class="divider" style="margin: 8px 0;"></div>
      <a class="nav-item" href="prd.html"><span class="icon">📋</span><span>PRD</span></a>
      <div class="divider" style="margin: 8px 0;"></div>
      <a class="nav-item" href="../index.html" onclick="localStorage.clear()"><span class="icon">↩</span><span>Sign out</span></a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-pill">
        <div class="user-avatar">PM</div>
        <div><div class="user-name">Priya Mehta</div><div class="user-role">NeoCredit Financial</div></div>
      </div>
    </div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <div><div class="topbar-title">Downloads</div><div class="topbar-sub">All completed enrichment runs available for download</div></div>
    </div>

    <div class="page-body">

      <div class="filter-row">
        <select id="filterProvider" onchange="renderTable()">
          <option value="">All providers</option>
          <option>Bureau ID</option>
          <option>HDFC Data Services</option>
          <option>PayU Insights</option>
        </select>
        <select id="filterStatus" onchange="renderTable()">
          <option value="">All statuses</option>
          <option>completed</option>
        </select>
      </div>

      <div class="card">
        <div class="table-wrap">
          <table id="reportsTable">
            <thead>
              <tr>
                <th>Date</th>
                <th>Provider</th>
                <th>Enrichments</th>
                <th>Matched</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="reportsBody"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="../assets/demo-data.js"></script>
<script>
function renderTable() {
  const provFilter = document.getElementById('filterProvider').value;
  const filtered = PAST_RUNS.filter(r => !provFilter || r.provider === provFilter);

  document.getElementById('reportsBody').innerHTML = filtered.map(run => {
    const matchPct = Math.round((run.matchedRecords / run.inputRecords) * 100);
    return `
      <tr>
        <td>${formatDate(run.date)}</td>
        <td>
          <div style="font-weight:600; color:var(--text);">${run.provider}</div>
          <div style="font-size:11.5px; color:var(--text-muted);">${run.category}</div>
        </td>
        <td>
          <div class="chip-row">${run.enrichments.map(e => `<span class="chip">${e}</span>`).join('')}</div>
        </td>
        <td>
          <div style="font-weight:600; color:var(--accent);">${run.matchedRecords.toLocaleString()}</div>
          <div style="font-size:11.5px; color:var(--text-muted);">${matchPct}% of ${run.inputRecords.toLocaleString()}</div>
        </td>
        <td><span class="badge badge-green badge-dot">Completed</span></td>
        <td>
          <div style="display:flex; gap:6px;">
            <button class="btn btn-sm btn-secondary" onclick="downloadCSV('${run.id}')">↓ CSV</button>
            <button class="btn btn-sm btn-secondary" onclick="downloadCert('${run.id}')">↓ Cert</button>
            <a href="results.html?run=${run.id}" class="btn btn-sm btn-ghost">View</a>
          </div>
        </td>
      </tr>
    `;
  }).join('');
}

function formatDate(d) {
  return new Date(d).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function downloadCSV(id) { showToast('📥 Downloading results CSV...'); }
function downloadCert(id) { showToast('📄 Downloading audit certificate...'); }

function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id = 'toast'; t.className = 'toast hidden'; document.body.appendChild(t); }
  t.textContent = msg;
  t.classList.remove('hidden');
  setTimeout(() => t.classList.add('hidden'), 3000);
}

renderTable();
</script>
</body>
</html>
